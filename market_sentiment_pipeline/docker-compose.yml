version: "3.8"

# ============================================================
#  Market Sentiment Pipeline — Docker Compose
#  Start everything: docker compose up -d
#  Stop everything:  docker compose down
#  View logs:        docker compose logs -f <service>
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
    AIRFLOW__WEBSERVER__SECRET_KEY: "market_sentiment_secret_2024"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PYTHONPATH: "/opt/airflow/project"
    # Pass through app env vars
    KAFKA_BROKER: kafka:29092
    DB_HOST: postgres-app
    DB_PORT: "5432"
    DB_NAME: market_sentiment
    DB_USER: postgres
    DB_PASSWORD: postgres123
  volumes:
    - ./airflow_dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - .:/opt/airflow/project
  depends_on:
    postgres-airflow:
      condition: service_healthy
  networks:
    - sentiment-net

services:

  # ── Zookeeper (required by Kafka) ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sentiment-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentiment-net

  # ── Apache Kafka ──────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sentiment-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"      # host access
      - "9101:9101"      # JMX (optional)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - sentiment-net

  # ── Kafka UI (browse topics visually) ────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sentiment-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - sentiment-net

  # ── PostgreSQL — application data ────────────────────────────────────────────
  postgres-app:
    image: postgres:15-alpine
    container_name: sentiment-postgres-app
    environment:
      POSTGRES_DB: market_sentiment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres-app-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d market_sentiment"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentiment-net

  # ── PostgreSQL — Airflow metadata ─────────────────────────────────────────────
  postgres-airflow:
    image: postgres:15-alpine
    container_name: sentiment-postgres-airflow
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentiment-net

  # ── Airflow DB initialisation ─────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: sentiment-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install kafka-python vaderSentiment psycopg2-binary pandas tweepy praw requests --quiet
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin || true
        echo "Airflow initialised."
    restart: "no"

  # ── Airflow Webserver ─────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: sentiment-airflow-webserver
    command: >
      bash -c "pip install kafka-python vaderSentiment psycopg2-binary pandas tweepy praw requests --quiet &&
               airflow webserver"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow Scheduler ─────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: sentiment-airflow-scheduler
    command: >
      bash -c "pip install kafka-python vaderSentiment psycopg2-binary pandas tweepy praw requests --quiet &&
               airflow scheduler"
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Streamlit Dashboard ───────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: sentiment-dashboard
    ports:
      - "8501:8501"
    environment:
      KAFKA_BROKER: kafka:29092
      DB_HOST: postgres-app
      DB_PORT: "5432"
      DB_NAME: market_sentiment
      DB_USER: postgres
      DB_PASSWORD: postgres123
    depends_on:
      postgres-app:
        condition: service_healthy
    networks:
      - sentiment-net
    restart: unless-stopped

  # ── Twitter Producer ──────────────────────────────────────────────────────────
  twitter-producer:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: sentiment-twitter-producer
    command: python data_ingestion/twitter_producer.py
    environment:
      KAFKA_BROKER: kafka:29092
      DB_HOST: postgres-app
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - sentiment-net
    restart: unless-stopped

  # ── Reddit Producer ───────────────────────────────────────────────────────────
  reddit-producer:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: sentiment-reddit-producer
    command: python data_ingestion/reddit_producer.py
    environment:
      KAFKA_BROKER: kafka:29092
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - sentiment-net
    restart: unless-stopped

  # ── Stock Producer ────────────────────────────────────────────────────────────
  stock-producer:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: sentiment-stock-producer
    command: python data_ingestion/stock_producer.py
    environment:
      KAFKA_BROKER: kafka:29092
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - sentiment-net
    restart: unless-stopped

  # ── Kafka Consumer ────────────────────────────────────────────────────────────
  kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: sentiment-kafka-consumer
    command: python kafka_pipeline/consumer.py
    environment:
      KAFKA_BROKER: kafka:29092
      DB_HOST: postgres-app
      DB_PORT: "5432"
      DB_NAME: market_sentiment
      DB_USER: postgres
      DB_PASSWORD: postgres123
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      postgres-app:
        condition: service_healthy
    networks:
      - sentiment-net
    restart: unless-stopped


volumes:
  postgres-app-data:
  postgres-airflow-data:


networks:
  sentiment-net:
    driver: bridge
